<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Vaga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Verificação de Elegibilidade</h2>
        
        <div class="input-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="input-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Ex: 25" min="0">
        </div>

        <div class="input-group">
            <label for="altura">Altura (em metros):</label>
            <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01" min="0">
        </div>

        <button id="btnVerificar">Verificar Candidatura</button>

        <div id="resultado" class="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
